name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    # How to release:
    # 1) bump packages/cli/package.json version
    # 2) create matching tag vX.Y.Z
    # 3) push tag (or run workflow_dispatch with release_tag)
    inputs:
      release_tag:
        description: "Tag to release (example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate_release:
    name: Validate Release Tag and Version
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.validate.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate release source
        id: validate
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            INPUT_TAG="${{ inputs.release_tag }}"
            if [[ -n "${INPUT_TAG}" ]]; then
              TAG="${INPUT_TAG}"
            elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
              TAG="${GITHUB_REF_NAME}"
            else
              echo "release_tag is required for workflow_dispatch when not running on a tag ref."
              exit 1
            fi
          fi

          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match semantic version format vX.Y.Z (received: ${TAG})."
            exit 1
          fi

          if ! git rev-parse --verify --quiet "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} does not exist in repository."
            exit 1
          fi

          git fetch origin main --tags --force
          TAG_SHA="$(git rev-list -n 1 "refs/tags/${TAG}")"
          if ! git merge-base --is-ancestor "${TAG_SHA}" "origin/main"; then
            echo "Tag ${TAG} must point to a commit reachable from origin/main."
            exit 1
          fi

          PACKAGE_VERSION=$(node -p "require('./packages/cli/package.json').version")
          if [[ "v${PACKAGE_VERSION}" != "${TAG}" ]]; then
            echo "Tag (${TAG}) does not match package version (v${PACKAGE_VERSION}) in packages/cli/package.json."
            exit 1
          fi

          echo "release_tag=${TAG}" >> "$GITHUB_OUTPUT"

  build_test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: validate_release
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: refs/tags/${{ needs.validate_release.outputs.release_tag }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Package dry-run
        run: npm run -w @okutucu/memorymesh publish:check

  publish_npm:
    name: Publish npm package (memorymesh)
    runs-on: ubuntu-latest
    needs: [validate_release, build_test]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: refs/tags/${{ needs.validate_release.outputs.release_tag }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish memorymesh
        # Keep token-based publish for now.
        # Future trusted publishing migration requires Node >=22.14.0 and npm >=11.5.1.
        run: npm publish -w @okutucu/memorymesh --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish_docker:
    name: Publish Docker image (GHCR)
    runs-on: ubuntu-latest
    needs: [validate_release, build_test, publish_npm]
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/gokayokutucu/memorymesh-server
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: refs/tags/${{ needs.validate_release.outputs.release_tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.validate_release.outputs.release_tag }}"
          VERSION="${TAG#v}"
          echo "version=${IMAGE_NAME}:${VERSION}" >> "$GITHUB_OUTPUT"
          echo "vversion=${IMAGE_NAME}:v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.tags.outputs.version }}
            ${{ steps.tags.outputs.vversion }}
            ${{ steps.tags.outputs.latest }}

  publish_installers:
    name: Publish installer assets
    runs-on: ubuntu-latest
    needs: [validate_release, build_test, publish_npm, publish_docker]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: refs/tags/${{ needs.validate_release.outputs.release_tag }}

      - name: Upload install scripts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate_release.outputs.release_tag }}
          files: |
            scripts/bootstrap/install.sh
            scripts/bootstrap/install.ps1
