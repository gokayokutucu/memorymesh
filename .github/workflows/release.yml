name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build_test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: NPM Publish Dry-Run
        run: npm run -w memorymesh publish:check

  release_notes_scaffold:
    name: Release Notes Scaffold (tag only)
    runs-on: ubuntu-latest
    needs: build_test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Summarize release metadata
        run: |
          echo "Tag: ${GITHUB_REF_NAME}" >> "$GITHUB_STEP_SUMMARY"
          echo "Changelog generation is scaffolded; connect release tooling in a later phase." >> "$GITHUB_STEP_SUMMARY"

  publish_npm:
    name: Publish NPM (tag only)
    runs-on: ubuntu-latest
    needs: [build_test, release_notes_scaffold]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish -w memorymesh --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish_docker:
    name: Publish Docker (tag only)
    runs-on: ubuntu-latest
    needs: [build_test, release_notes_scaffold]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Tag
        id: vars
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build and Push (server)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: |
            ghcr.io/memorymesh/server:${{ steps.vars.outputs.tag }}
            ghcr.io/memorymesh/server:latest

  publish_bootstrap_assets:
    name: Publish Bootstrap Assets (tag only)
    runs-on: ubuntu-latest
    needs: [build_test, release_notes_scaffold]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload install scripts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            scripts/bootstrap/install.sh
            scripts/bootstrap/install.ps1
