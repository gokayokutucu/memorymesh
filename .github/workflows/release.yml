name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to release (example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Resolve Release Tag
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
    steps:
      - name: Resolve release tag
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ inputs.release_tag }}"
          fi

          if [[ -z "${TAG}" ]]; then
            echo "release_tag is required."
            exit 1
          fi

          if [[ "${TAG}" != v* ]]; then
            echo "release_tag must start with 'v' (example: v0.1.0)."
            exit 1
          fi

          echo "release_tag=${TAG}" >> "$GITHUB_OUTPUT"

  build_test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.prepare.outputs.release_tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Package dry-run
        run: npm run -w memorymesh publish:check

  publish_npm:
    name: Publish npm package (memorymesh)
    runs-on: ubuntu-latest
    needs: [prepare, build_test]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.prepare.outputs.release_tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish memorymesh
        run: npm publish -w memorymesh --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish_docker:
    name: Publish Docker image (GHCR)
    runs-on: ubuntu-latest
    needs: [prepare, build_test]
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/memorymesh/server
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.prepare.outputs.release_tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.prepare.outputs.release_tag }}"
          VERSION="${TAG#v}"
          echo "version=${IMAGE_NAME}:${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: |
            ${{ steps.tags.outputs.version }}
            ${{ steps.tags.outputs.latest }}
