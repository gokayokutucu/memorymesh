services:
  qdrant:
    image: qdrant/qdrant:latest
    expose:
      - "6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    expose:
      - "11434"
    volumes:
      - ollama_models:/root/.ollama

  ollama-model-init:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        echo "[ollama-model-init] waiting for ollama..."
        until ollama list >/dev/null 2>&1; do sleep 2; done
        echo "[ollama-model-init] pulling model: $$EMBEDDING_MODEL"
        ollama pull "$$EMBEDDING_MODEL"
        echo "[ollama-model-init] model ready: $$EMBEDDING_MODEL"
    restart: "no"

  mongodb:
    image: mongo:7
    expose:
      - "27017"
    environment:
      - MONGO_INITDB_DATABASE=memorymesh
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    volumes:
      - mongodb_data:/data/db

  neo4j:
    image: neo4j:5
    expose:
      - "7474"
      - "7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
    volumes:
      - neo4j_data:/data

  gateway:
    image: haproxy:3.0-alpine
    depends_on:
      qdrant:
        condition: service_started
      ollama:
        condition: service_started
      mongodb:
        condition: service_started
      neo4j:
        condition: service_started
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${OLLAMA_PORT:-11434}:11434"
      - "${MONGO_PORT:-27017}:27017"
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    command:
      - /bin/sh
      - -ec
      - |
        cat >/usr/local/etc/haproxy/haproxy.cfg <<'EOF'
        global
          log stdout format raw local0
        defaults
          mode tcp
          timeout connect 5s
          timeout client 60s
          timeout server 60s
        frontend qdrant_front
          bind *:6333
          default_backend qdrant_back
        backend qdrant_back
          server qdrant qdrant:6333
        frontend ollama_front
          bind *:11434
          default_backend ollama_back
        backend ollama_back
          server ollama ollama:11434
        frontend mongo_front
          bind *:27017
          default_backend mongo_back
        backend mongo_back
          server mongodb mongodb:27017
        frontend neo4j_http_front
          bind *:7474
          default_backend neo4j_http_back
        backend neo4j_http_back
          server neo4j_http neo4j:7474
        frontend neo4j_bolt_front
          bind *:7687
          default_backend neo4j_bolt_back
        backend neo4j_bolt_back
          server neo4j_bolt neo4j:7687
        EOF
        exec haproxy -W -db -f /usr/local/etc/haproxy/haproxy.cfg

  memorymesh:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    env_file:
      - .env
    depends_on:
      qdrant:
        condition: service_started
      ollama:
        condition: service_started
      ollama-model-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_started
      neo4j:
        condition: service_started
    ports:
      - "${HTTP_PORT:-3456}:${HTTP_PORT:-3456}"
    environment:
      - TRANSPORT=http
      - HTTP_PORT=${HTTP_PORT:-3456}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=11434
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
      - QDRANT_COLLECTION=memories
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_DB=memorymesh
      - MONGO_USER=${MONGO_USER}
      - MONGO_PASSWORD=${MONGO_PASSWORD}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}

volumes:
  qdrant_storage:
  ollama_models:
  mongodb_data:
  neo4j_data:
