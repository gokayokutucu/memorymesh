services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama

  mongodb:
    image: mongo:7
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      - MONGO_INITDB_DATABASE=memorymesh
    volumes:
      - mongodb_data:/data/db

  neo4j:
    image: neo4j:5
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      - NEO4J_AUTH=none
    volumes:
      - neo4j_data:/data

  memorymesh:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    depends_on:
      - qdrant
      - ollama
      - mongodb
      - neo4j
    ports:
      - "${HTTP_PORT:-3456}:${HTTP_PORT:-3456}"
    environment:
      - TRANSPORT=http
      - HTTP_PORT=${HTTP_PORT:-3456}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=11434
      - EMBEDDING_MODEL=nomic-embed-text
      - QDRANT_COLLECTION=memories
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_DB=memorymesh
      - NEO4J_URI=bolt://neo4j:7687

volumes:
  qdrant_storage:
  ollama_models:
  mongodb_data:
  neo4j_data:
