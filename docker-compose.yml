services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama

  mongodb:
    image: mongo:7
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      - MONGO_INITDB_DATABASE=memorymesh
    volumes:
      - mongodb_data:/data/db

  memorymesh:
    build: .
    depends_on:
      - qdrant
      - ollama
      - mongodb
    ports:
      - "${HTTP_PORT:-3456}:${HTTP_PORT:-3456}"
    environment:
      - TRANSPORT=http
      - HTTP_PORT=${HTTP_PORT:-3456}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=11434
      - EMBEDDING_MODEL=nomic-embed-text
      - QDRANT_COLLECTION=memories
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_DB=memorymesh
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  qdrant_storage:
  ollama_models:
  mongodb_data:
